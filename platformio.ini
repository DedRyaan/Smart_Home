; PlatformIO project for the ESP32 Smart-Home Attachment
; Lights + fan (relays) and AC (IR), with Alexa (local Hue emulation) and manual switch sync.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -DCHIP_HAVE_CONFIG_H=1

board_build.partitions = min_spiffs.csv

lib_deps =
    crankyoldgit/IRremoteESP8266 @ ^2.8.6

[env:ir_blink]
extends = env:esp32dev
build_src_filter = +<../tools/ir_blink/> -<*>

[env:ir_midea_test]
extends = env:esp32dev
build_src_filter = +<../tools/ir_midea_test/> -<*>

[env:esp32dev_ota]
extends = env:esp32dev
upload_protocol = espota
upload_port = smarthome.local
upload_flags =
    --auth=21122112



