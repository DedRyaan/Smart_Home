; PlatformIO project for the ESP32 Smart-Home Attachment
; Lights + fan (relays) and AC (IR), with Alexa (local Hue emulation) and manual switch sync.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -D ESPALEXA_ASYNC
    -D ESPALEXA_MAXDEVICES=5

lib_deps =
    tzapu/WiFiManager
    ; me-no-dev repos were archived (read-only) Jan 2025; use the maintained ESP32Async forks.
    ESP32Async/ESPAsyncWebServer @ ^3.11.0
    ESP32Async/AsyncTCP @ ^3.4.10
    aircoookie/Espalexa
    crankyoldgit/IRremoteESP8266
    bblanchon/ArduinoJson @ ^6.21.5
