; PlatformIO project for the ESP32 Smart-Home Attachment
; Lights + fan (relays) and AC (IR), with Alexa (local Hue emulation) and manual switch sync.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -D ESPALEXA_ASYNC
    -D ESPALEXA_MAXDEVICES=6

lib_deps =
    tzapu/WiFiManager
    me-no-dev/ESPAsyncWebServer
    me-no-dev/AsyncTCP
    aircoookie/Espalexa
    crankyoldgit/IRremoteESP8266
    bblanchon/ArduinoJson
